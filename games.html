  <meta charset="UTF-8">

<nav class="navbar">
  <div class="logo">🪲 INSECTS MUSEUM</div>

<!-- ✅ MAIN PAGE -->
<section class="games-page">

  <h1 class="games-title">GAMES</h1>
  <p class="games-sub">LEARN WHILE HAVING FUN!</p>

  <div class="games-grid">

    <!-- GAME 1 -->
    <div class="game-card">
      <h3>CATCH THE INSECTS</h3>
      <img src="images/insect.jpg" alt="Catch the Insects">
      <p>Catch as many insects as you can before time runs out!</p>
      <button class="play-btn" onclick="openGameMenu()">PLAY NOW</button>
      
    </div>

    <!-- GAME 2 -->
    <div class="game-card">
      <h3>QUIZ CHALLENGE</h3>
      <img src="images/quiz.png" alt="Quiz Challenge">
      <p>Test your knowledge about insects.</p>
      <button class="play-btn" onclick="openQuiz()">PLAY NOW</button>
    </div>

  </div>

</section>
